name: Build go2rtc ezviz

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: pedropaulovc/go2rtc
          ref: dev
          fetch-depth: 0

      - name: Merge ezviz PRs in ordine
        run: |
          git config user.email "ci@build"
          git config user.name "gablilli.bot"
          git fetch origin feat/ezviz-source
          git merge origin/feat/ezviz-source --no-edit
          git fetch origin feat/ezviz-p2p-transport
          git merge origin/feat/ezviz-p2p-transport --no-edit
          git fetch origin feat/ezviz-discovery
          git merge origin/feat/ezviz-discovery --no-edit
          git fetch origin feat/ezviz-playback
          git merge origin/feat/ezviz-playback --no-edit

      - name: Mostra struttura repo
        run: |
          echo "=== root ==="
          ls -la
          echo "=== cerca main.go ==="
          find . -name "main.go" | head -20
          echo "=== go.mod ==="
          cat go.mod | head -5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o go2rtc ./cmd/go2rtc/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go2rtc-ezviz-x86
          path: go2rtc
          retention-days: 7
